<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cozway API Health</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
  }
  .card {
    width: 360px;
    background: #1e293b;
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    text-align: center;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    background: #64748b;
  }
  .dot.ok { background: #22c55e; box-shadow: 0 0 12px #22c55e; }
  .dot.bad { background: #ef4444; box-shadow: 0 0 12px #ef4444; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
  .rows { text-align: left; font-size: 14px; }
  .row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #334155;
  }
  .row:last-child { border-bottom: none; }
  .row span:first-child { color: #94a3b8; }
  .badge {
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .badge.connected, .badge.ok { background: rgba(34,197,94,0.15); color: #22c55e; }
  .badge.disconnected, .badge.error { background: rgba(239,68,68,0.15); color: #ef4444; }
  .badge.connecting, .badge.disconnecting { background: rgba(234,179,8,0.15); color: #eab308; }
  .updated { margin-top: 20px; font-size: 11px; color: #64748b; }
</style>
</head>
<body>
  <div class="card">
    <div>
      <span id="dot" class="dot"></span>
      <h1 id="title">Checking status…</h1>
    </div>
    <div class="sub">Cozway API</div>
    <div class="rows">
      <div class="row"><span>Status</span><span id="status" class="badge">—</span></div>
      <div class="row"><span>Database</span><span id="db" class="badge">—</span></div>
      <div class="row"><span>Uptime</span><span id="uptime">—</span></div>
    </div>
    <div class="updated" id="updated"></div>
  </div>

<script>
  function formatUptime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = Math.floor(seconds % 60);
    return `${h}h ${m}m ${s}s`;
  }

  async function check() {
    const dot = document.getElementById('dot');
    const title = document.getElementById('title');
    const statusEl = document.getElementById('status');
    const dbEl = document.getElementById('db');
    const uptimeEl = document.getElementById('uptime');
    const updatedEl = document.getElementById('updated');

    try {
      const res = await fetch('/api/health');
      const data = await res.json();
      const healthy = res.ok && data.status === 'ok' && data.db === 'connected';

      dot.className = 'dot ' + (healthy ? 'ok' : 'bad');
      title.textContent = healthy ? 'All systems operational' : 'Something needs attention';
      statusEl.textContent = data.status;
      statusEl.className = 'badge ' + data.status;
      dbEl.textContent = data.db;
      dbEl.className = 'badge ' + data.db;
      uptimeEl.textContent = formatUptime(data.uptime);
    } catch (err) {
      dot.className = 'dot bad';
      title.textContent = 'API unreachable';
      statusEl.textContent = 'error';
      statusEl.className = 'badge error';
      dbEl.textContent = '—';
      dbEl.className = 'badge';
      uptimeEl.textContent = '—';
    }
    updatedEl.textContent = 'Last checked ' + new Date().toLocaleTimeString();
  }

  check();
  setInterval(check, 5000);
</script>
</body>
</html>
